name: Test and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
      - name: Run tests
        run: |
          pytest src/tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - uses: actions/checkout@v4

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Build and Push to Artifact Registry'
        run: |
          gcloud builds submit --tag asia-southeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/scamsentinel-repo/scamsentinel-api:latest

      - name: 'Deploy to Cloud Run'
        run: |
          gcloud run deploy scamsentinel-api \
            --image asia-southeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/scamsentinel-repo/scamsentinel-api:latest \
            --region asia-southeast1 \
            --platform managed \
            --set-secrets "GEMINI_API_KEY=gemini-api-key:latest,FIREBASE_SERVICE_ACCOUNT=firebase-service-account:latest,VERTEX_SERVICE_ACCOUNT=vertex-service-account:latest,FIRESTORE_PROJECT_ID=firestore-project-id:latest" \
            --allow-unauthenticated
